<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clean Reader</title>
    <link rel="stylesheet" href="reader.css">
  </head>
  <body>
    <header class="reader-toolbar" aria-label="Reader controls">
      <div class="toolbar-primary">
        <div class="toolbar-controls">
          <div class="reader-mark" aria-hidden="true">Aa</div>

          <label class="control control-font">
            <span>Font</span>
            <select id="fontSelect"></select>
            <input id="customFontInput" class="custom-font-input" type="text" maxlength="140" spellcheck="false" autocomplete="off" aria-label="Custom font name" title="Use exact installed family names, separated by commas if needed" placeholder="Custom font name" hidden>
          </label>

          <div class="control control-stepper">
            <span>Size</span>
            <button class="stepper-btn" id="sizeDecButton" type="button" aria-label="Decrease size">&minus;</button>
            <input id="sizeValueInput" class="stepper-value" type="number" min="15" max="24" step="1" aria-label="Size value">
            <button class="stepper-btn" id="sizeIncButton" type="button" aria-label="Increase size">+</button>
          </div>

          <div class="control control-stepper">
            <span>Spacing</span>
            <button class="stepper-btn" id="lineHeightDecButton" type="button" aria-label="Decrease spacing">&minus;</button>
            <input id="lineHeightValueInput" class="stepper-value" type="number" min="1.35" max="2.05" step="0.05" aria-label="Spacing value">
            <button class="stepper-btn" id="lineHeightIncButton" type="button" aria-label="Increase spacing">+</button>
          </div>

          <div class="control control-stepper">
            <span>Width</span>
            <button class="stepper-btn" id="widthDecButton" type="button" aria-label="Decrease width">&minus;</button>
            <input id="widthValueInput" class="stepper-value" type="number" min="560" max="940" step="1" aria-label="Width value">
            <button class="stepper-btn" id="widthIncButton" type="button" aria-label="Increase width">+</button>
          </div>

          <label class="control control-theme">
            <span>Theme</span>
            <select id="themeSelect">
              <option value="white">White</option>
              <option value="light">Light</option>
              <option value="sepia">Sepia</option>
              <option value="dark">Dark</option>
              <option value="night">Night</option>
            </select>
          </label>

          <button class="reset-button" id="resetPrefsButton" type="button" hidden>Reset</button>
        </div>

        <button class="stepper-btn" id="openSettingsButton" type="button" aria-label="Open Clean Reader settings">&#9881;</button>
        <button class="close-button" id="closeOverlayButton" type="button">Close</button>
      </div>
    </header>

    <main class="page-shell">
      <article class="reader-document" id="readerDocument">
        <header class="article-header">
          <p class="article-site" id="articleSite"></p>
          <h1 id="articleTitle">Clean Reader</h1>
          <div class="article-meta" id="articleMeta"></div>
          <p class="article-excerpt" id="articleExcerpt"></p>
        </header>
        <section class="article-content" id="articleContent"></section>
      </article>
    </main>

    <div class="obsidian-save-popup" id="obsidianPopup" hidden>
      <div class="obsidian-popup-default" id="obsidianPopupDefault">
        <button class="obsidian-popup-btn" type="button" id="obsidianSaveButton">Save</button>
        <button class="obsidian-popup-btn" type="button" id="obsidianCommentButton">Add comment</button>
      </div>
      <div class="obsidian-popup-comment" id="obsidianPopupComment" hidden>
        <textarea id="obsidianCommentInput" rows="2" placeholder="Add a note&hellip;"></textarea>
        <div class="obsidian-popup-comment-actions">
          <button class="obsidian-popup-btn" type="button" id="obsidianCommentCancelButton">Cancel</button>
          <button class="obsidian-popup-btn obsidian-popup-btn-primary" type="button" id="obsidianCommentSaveButton">Save</button>
        </div>
      </div>
    </div>

    <script src="reader.js"></script>
  </body>
</html>
